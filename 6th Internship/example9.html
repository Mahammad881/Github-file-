<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="number" id="a" placeholder="first number" />
    <input type="numer" id="b" placeholder="second number" /><br />
    <button id="btn1">add</button>
    <button id="btn2">sub</button>
    <button id="btn3">mul</button>
    <button id="btn4">div</button>

    <h3>result: <span id="RS"> 0</span></h3>
    <script>
      const sum = (a, b) => {
        return a + b;
      };
      const sub = (a, b) => {
        return a - b;
      };
      const mul = (a, b) => {
        return a * b;
      };
      const div = (a, b) => {
        return a / b;
      };
      const btn1 = document.querySelector("#btn1");
      btn1.addEventListener("click", () => {
        const a = Number(document.querySelector("#a").value);
        const b = Number(document.querySelector("#b").value);
        const T = sum(a, b);
        document.querySelector("#RS").innerHTML = T;
      });
      const btn2 = document.querySelector("#btn2");
      btn2.addEventListener("click", () => {
        const a = Number(document.querySelector("#a").value);
        const b = Number(document.querySelector("#b").value);
        const T = sub(a, b);
        document.querySelector("#RS").innerHTML = T;
      });
      const btn3 = document.querySelector("#btn3");
      btn3.addEventListener("click", () => {
        const a = Number(document.querySelector("#a").value);
        const b = Number(document.querySelector("#b").value);
        const T = mul(a, b);
        document.querySelector("#RS").innerHTML = T;
      });
      const btn4 = document.querySelector("#btn4");
      btn4.addEventListener("click", () => {
        const a = Number(document.querySelector("#a").value);
        const b = Number(document.querySelector("#b").value);
        const T = div(a, b);
        document.querySelector("#RS").innerHTML = T;
      });
    </script>
  </body>
</html>
