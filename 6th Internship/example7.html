<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="user" placeholder="enter your name">
    <p id="ptag">welcome</p>
    <script>
        const inputfield=document.querySelector("#user");
        const ptags=document.querySelector("#ptag");

        inputfield.addEventListener("input",()=>{
            const name=inputfield.value;
            ptags.innerText="welcome,"+name;
        })
    </script>
    
</body>
</html>
